name: Daily Outreach Pipeline

on:
  schedule:
    - cron: '30 3 * * *' # Runs daily at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai google-api-python-client google-auth-oauthlib google-auth-httplib2 pydantic

      - name: Reconstruct credentials and token
        run: |
          echo "$GMAIL_CREDENTIALS" > credentials.json
          echo "$GMAIL_TOKEN" > token.json
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN_JSON }}

      - name: Run outreach pipeline
        run: python discover_and_outreach.py --send --non-interactive
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push cache updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add company_contacts_cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update company contacts cache [skip ci]" && git push)
